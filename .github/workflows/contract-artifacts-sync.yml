name: Contract Artifacts Sync

on:
  push:
    paths:
      - "database/contracts/**"
      - "app/scripts/generate-contracts.ts"
      - "app/src/lib/mt5/**"
      - "app/services/mt5/Experts/Include/Generated/**"
      - ".github/workflows/contract-artifacts-sync.yml"
  pull_request:
    paths:
      - "database/contracts/**"
      - "app/scripts/generate-contracts.ts"
      - "app/src/lib/mt5/**"
      - "app/services/mt5/Experts/Include/Generated/**"
      - ".github/workflows/contract-artifacts-sync.yml"

jobs:
  verify-generated-contracts:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Regenerate contracts
        run: npx tsx app/scripts/generate-contracts.ts

      - name: Verify generated artifacts are committed
        run: git diff --exit-code -- app/src/lib/mt5/contracts.ts app/services/mt5/Experts/Include/Generated/Contract.mqh
